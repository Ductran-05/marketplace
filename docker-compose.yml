services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-postgres
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka KRaft mode (không cần Zookeeper) — 2 listener:
  #   PLAINTEXT      kafka:29092    → cho container khác trong network (kafka-ui, sau này là services)
  #   PLAINTEXT_HOST localhost:9092 → cho app chạy trên máy host
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: marketplace-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: marketplace-kafka-ui
    ports:
      - "8090:8080"  # Web UI
    environment:
      KAFKA_CLUSTERS_0_NAME: marketplace
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  mailhog:
    image: mailhog/mailhog:latest
    container_name: marketplace-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  minio:
    image: minio/minio:latest
    container_name: marketplace-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  dbgate:
    image: dbgate/dbgate:latest
    container_name: marketplace-dbgate
    ports:
      - "3100:3000"  # Web UI
    environment:
      CONNECTIONS: pg,rd
      LABEL_pg: Marketplace DB
      SERVER_pg: postgres        # tên service trong compose network
      PORT_pg: 5432
      USER_pg: marketplace
      PASSWORD_pg: marketplace
      DATABASE_pg: marketplace
      ENGINE_pg: postgres@dbgate-plugin-postgres
      LABEL_rd: Marketplace Redis
      SERVER_rd: redis
      PORT_rd: 6379
      ENGINE_rd: redis@dbgate-plugin-redis
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - dbgate_data:/root/.dbgate

volumes:
  postgres_data:
  redis_data:
  dbgate_data:
  minio_data:
  kafka_data:
